name: Build and Deploy Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter (Compatible Version)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          architecture: X64
          cache: false

      - name: Create Env File
        run: |
          echo "BASE_URL=http://localhost" >> .env
          echo "CAPTACHA_SITE_KEY=mock" >> .env
          echo "CAPTACHA_SECRET_KEY=mock" >> .env
          echo "INVITE_CODE=1234" >> .env

      - name: Get Dependencies
        run: flutter pub get

      - name: Configure Web Index
        run: |
          sed -i 's|<base href="[^"]*">|<base href="\$FLUTTER_BASE_HREF">|g' web/index.html
          if ! grep -q '<base href="\$FLUTTER_BASE_HREF">' web/index.html; then
            sed -i 's|<head>|<head>\n  <base href="\$FLUTTER_BASE_HREF">|g' web/index.html
          fi

      - name: Build Web Application
        run: flutter build web --base-href "/" --no-wasm-dry-run

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web
