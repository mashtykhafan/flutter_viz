name: Flutter Web Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-web:
    runs-on: ubuntu-24.04

    steps:
      # 1. گرفتن آخرین کدهای ریپازیتوری
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. راه اندازی جاوا ۱۷
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. 🌟 آپدیت نسخه فلاتر به 3.44.2 برای هماهنگی با دارت جدید و پکیج Syncfusion
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'
          cache: false

      # 4. ساخت خودکار فایل‌های محیطی .env
      - name: Create .env file
        run: |
          echo "BASE_URL=http://localhost" >> .env
          echo "CAPTACHA_SITE_KEY=mock" >> .env
          echo "CAPTACHA_SECRET_KEY=mock" >> .env
          echo "INVITE_CODE=1234" >> .env

      # 5. تزریق اورراید برای محکم‌کاری تداخل‌های احتمالی
      - name: Inject dependency override for intl
        run: |
          echo "" >> pubspec.yaml
          echo "dependency_overrides:" >> pubspec.yaml
          echo "  intl: ^0.20.2" >> pubspec.yaml

      # 6. گرفتن پکیج‌ها (این بار با نسخه جدید دارت بدون مشکل رد می‌شود)
      - name: Install dependencies
        run: flutter pub get

      # 7. گرفتن خروجی نهایی وب
      - name: Build Web Application
        run: flutter build web --release

      # 8. آپلود خروجی در گیت‌هاب برای دانلود مستقیم تو
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: build/web/
